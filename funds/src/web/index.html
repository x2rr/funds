<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>自选基金助手 - Web版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="main.css">
  <script src="https://jic.talkingdata.com/app/h5/v1?appid=F3BA868110984DA28BD73CDAB0DC7D8A&vn=v2.4.0&vc=2.4.0"></script>
</head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: #f5f5f5;
  }

  ::-webkit-scrollbar {
    width: 7px;
    height: 7px;
    background-color: rgba(240, 240, 240, 1);
  }

  ::-webkit-scrollbar-track {
    box-shadow: inset 0 0 0px rgba(240, 240, 240, 0.5);
    border-radius: 10px;
    background-color: rgba(240, 240, 240, 0.5);
  }

  ::-webkit-scrollbar-thumb {
    border-radius: 10px;
    box-shadow: inset 0 0 0px rgba(240, 240, 240, 0.5);
    background-color: #cccccc;
  }

  a:link,
  a:active,
  a:visited,
  a:hover {
    color: #409eff;
    text-decoration: none;
  }

  .darkMode a {
    color: rgba(64, 158, 255, 0.6);
  }

  a:hover {
    text-decoration: underline;
  }

  .web-header {
    background: linear-gradient(135deg, #409eff 0%, #67c23a 100%);
    padding: 15px 20px;
    color: white;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
  }

  .web-header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 500;
  }

  .web-header p {
    margin: 5px 0 0;
    font-size: 14px;
    opacity: 0.9;
  }

  .web-container {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
  }

  .web-main {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
    overflow: hidden;
  }

  .web-nav {
    display: flex;
    background: #fafafa;
    border-bottom: 1px solid #e4e7ed;
  }

  .web-nav-item {
    padding: 12px 24px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.3s;
    font-size: 14px;
    color: #606266;
  }

  .web-nav-item:hover {
    color: #409eff;
  }

  .web-nav-item.active {
    color: #409eff;
    border-bottom-color: #409eff;
    font-weight: 500;
  }

  .web-content {
    padding: 0;
  }

  .darkMode .web-header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a3f 100%);
  }

  .darkMode .web-container {
    background-color: #121212;
  }

  .darkMode .web-main {
    background: #1e1e1e;
  }

  .darkMode .web-nav {
    background: #282828;
    border-bottom-color: #383838;
  }

  .darkMode .web-nav-item {
    color: rgba(255, 255, 255, 0.6);
  }

  .darkMode .web-nav-item:hover,
  .darkMode .web-nav-item.active {
    color: rgba(64, 158, 255, 0.87);
  }

  .loading-mask {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .darkMode .loading-mask {
    background: rgba(18, 18, 18, 0.9);
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e4e7ed;
    border-top-color: #409eff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .tab-row {
    padding: 12px 0;
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: stretch;
    margin: 0;
    gap: 12px;
    position: relative;
  }

  .tab-col {
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 12px 8px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 1px solid #e4e7ed;
    transition: all 0.3s ease;
  }

  .tab-col:hover {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    border-color: #409eff;
  }

  .tab-col h5 {
    margin: 0 0 8px 0;
    font-size: 13px;
    font-weight: 500;
    color: #303133;
  }

  .tab-col p {
    margin: 4px 0;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .darkMode .tab-col {
    background-color: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.15);
  }

  .darkMode .tab-col:hover {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    border-color: rgba(64, 158, 255, 0.6);
  }

  .darkMode .tab-col h5 {
    color: rgba(255, 255, 255, 0.8);
  }
</style>

<body>
  <div id="app-loading" class="loading-mask">
    <div class="loading-spinner"></div>
  </div>

  <div id="app">
  </div>

  <script src="main.js"></script>
</body>

</html>
